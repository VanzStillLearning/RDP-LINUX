name: Linux-Desktop-Remote

on:
  workflow_dispatch:

jobs:
  linux-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install Ubuntu Desktop (GUI) & Chrome
        run: |
          sudo apt-get update
          # Mengunduh Google Chrome terbaru
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install ./google-chrome-stable_current_amd64.deb -y
          
          # Mengunduh installer Chrome Remote Desktop
          wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo apt-get install ./chrome-remote-desktop_current_amd64.deb -y
          
          # Menginstal lingkungan desktop ringan (XFCE) agar tidak lag
          sudo DEBIAN_FRONTEND=noninteractive apt-get install xfce4 desktop-base xfce4-goodies -y
          sudo bash -c 'echo "exec /etc/X11/Xsession /usr/bin/xfce4-session" > /etc/chrome-remote-desktop-session'
          sudo systemctl disable lightdm.service

      - name: Connect to Chrome Remote Desktop
        run: |
          DISPLAY= /opt/google/chrome-remote-desktop/start-host --code="4/0AdkVLPzAXxeS280ZomfS-G4lMtnmlb0O80fbm2X1Xwp-pnCUeaoBEORyNWQfRNtKsb0mDg" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$(hostname) --pin=123456

      - name: Keep Alive
        run: |
          # Menjaga server tetap aktif
          while true; do
              echo "[$(date)] Linux Desktop Active..."
              sleep 300
          done
          
